<wicket:panel>

	<wicket:extend>
		<div class="row" wicket:id="data">

			<div class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<div class="border w-100 pt-2 pb-2 ps-2 pe-2">

					<div class="row">
						<div wicket:id="imageContainer" class="col-xxl-1 col-xl-1 col-lg-1 col-md-2 col-sm-12 col-xs-12">

							<a class="mb-0 mb-lg-0" wicket:id="image-link"
								style="position: relative; float: left; width: 100%; text-align: center;" href="#"> <img class="thumbnail"
								wicket:id="image" />
							</a> <a class="mb-0 mb-lg-0" wicket:id="icon-link">
								<div class="fs-2 border text-bg-light text-center pt-1 pb-1 fs-2">
									<i wicket:id="icon" />
								</div>
							</a>
						</div>

						<div wicket:id="titleTextContainer"
							class="mt-3 mt-md-0 mt-xl-0 mt-lg-0 mt-xxl-0 col-xxl-11 col-xl-11 col-lg-11 col-md-10 col-sm-12 col-xs-12 text-lg-start text-md-start text-xs-center ps-lg-0 pe-lg-0 ps-xl-0 pe-xl-0 ps-xxl-0 pe-xxl-0">

							<div class="row">
								<div class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
									<a wicket:id="title-link" class="title-link  text-lg-start text-md-start text-xs-center text-center" href="#">
										<span class="ms-0 me-0" wicket:id="title"></span>
									</a>
								</div>
							</div>

							<div wicket:id="subtitle-container" class="row">
								<div class="subtitle col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12 float-start text-lg-start text-md-start text-xs-center">
									<span wicket:id="subtitle"></span>
								</div>
							</div>

						</div>

						<div class="menuContainer">
							<div style="display: inline; width: auto;">
								<div class="float-end mt-1 itemMenu" wicket:id="menu"></div>
							</div>
						</div>

					</div>
				</div>

			</div>
		</div>


	</wicket:extend>
</wicket:panel>
